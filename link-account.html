<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Account | Waste Universe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/portal.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabaseClient.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Waste Universe Logo" style="height: 38px; width: auto; display: block;" loading="lazy">
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <div class="mobile-toggle" id="mobileToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Link Account Section -->
    <section class="portal-section">
        <div class="portal-card" style="max-width: 480px;">
            <div class="portal-card-header">
                <img src="assets/images/logo.png" alt="Waste Universe" style="height: 36px; margin-bottom: 16px;">
                <h2>Link Your Existing Account</h2>
                <p>Enter the email or phone number on your existing Waste Universe service account to connect it to this portal.</p>
            </div>
            <form id="linkForm">
                <div class="form-group">
                    <label for="linkIdentifier">Email or Phone Number</label>
                    <input type="text" id="linkIdentifier" required placeholder="e.g. name@email.com or 4015551234">
                </div>
                <div id="linkMessage" class="portal-error"></div>
                <button type="submit" id="linkBtn" class="portal-btn">Find My Account</button>
                <a href="dashboard.html" class="portal-btn-outline">Skip for now</a>
            </form>
        </div>
    </section>

    <script src="assets/js/portal.js"></script>
</body>
</html>
