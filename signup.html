<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Waste Universe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/portal.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabaseClient.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Waste Universe Logo" style="height: 38px; width: auto; display: block;" loading="lazy">
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="login.html">Log In</a>
            </div>
            <div class="mobile-toggle" id="mobileToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="portal-section">
        <div class="portal-card">
            <div class="portal-card-header">
                <img src="assets/images/logo.png" alt="Waste Universe" style="height: 36px; margin-bottom: 16px;">
                <h2>Create Your Account</h2>
                <p>Sign up to manage your waste services online.</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required placeholder="Min. 6 characters" minlength="6">
                </div>
                <div id="signupError" class="portal-error"></div>
                <div id="signupSuccess" class="portal-success"></div>
                <button type="submit" id="signupBtn" class="portal-btn">Create Account</button>
            </form>
            <p class="portal-switch">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </section>

    <script src="assets/js/portal.js"></script>
</body>
</html>
