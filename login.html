<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Waste Universe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/portal.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabaseClient.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Waste Universe Logo" style="height: 38px; width: auto; display: block;" loading="lazy">
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="signup.html">Sign Up</a>
            </div>
            <div class="mobile-toggle" id="mobileToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="portal-section">
        <div class="portal-card">
            <div class="portal-card-header">
                <img src="assets/images/logo.png" alt="Waste Universe" style="height: 36px; margin-bottom: 16px;">
                <h2>Customer Login</h2>
                <p>Access your account to manage services and billing.</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="Your password">
                </div>
                <div id="loginError" class="portal-error"></div>
                <button type="submit" id="loginBtn" class="portal-btn">Log In</button>
            </form>
            <p class="portal-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </section>

    <script src="assets/js/portal.js"></script>
</body>
</html>
